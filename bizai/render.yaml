services:
  # ── 1. Backend — Express API (Web Service) ────────────────────────────────
  - type: web
    name: bizai-backend
    runtime: node
    region: singapore

    buildCommand: cd bizai/server && npm install
    startCommand: node bizai/server/index.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Paste these values in Render dashboard → Environment:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # After Static Site deploys, paste its URL here (for CORS):
      - key: CLIENT_URL
        sync: false

  # ── 2. Frontend — React app (Static Site) ────────────────────────────────
  - type: web
    name: bizai-frontend
    runtime: static
    region: singapore

    buildCommand: cd bizai/client && npm install && npm run build
    staticPublishPath: bizai/client/dist

    envVars:
      # Paste the bizai-backend Web Service URL here BEFORE deploying frontend:
      # e.g. https://bizai-backend.onrender.com/api
      - key: VITE_API_URL
        sync: false

    routes:
      # Send all routes to index.html so React Router works
      - type: rewrite
        source: /*
        destination: /index.html
